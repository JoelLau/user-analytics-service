version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "queries"
        out: "queries"
        sql_package: "pgx/v5"
        output_files_suffix: ".gen"
        emit_json_tags: true
        overrides:
          - db_type: "text"
            go_type:
              type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type: "*time.Time"
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type: "*time.Time"
