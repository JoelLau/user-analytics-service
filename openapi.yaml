openapi: "3.0.3"
info:
  version: 1.0.0
  title: User Analytics Service REST API

paths:
  /api/livez:
    get:
      operationId: Livez
      description: liveness check - checks if process is deadlocked
      responses:
        "200":
          description: process is running fine
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
              example:
                data: "ok"

  /api/readyz:
    get:
      operationId: Readyz
      description: readiness check - checks if process can handle traffic (also considers downstream dependencies)
      responses:
        "200":
          description: process is ready to handle traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
              example:
                data: "ok"
        "500":
          description: process is not ready (downstream dependency unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                type: "https://github.com/JoelLau/user-analytics-service/errors/database-unavailable"
                title: "Service Unavailable"
                status: 500
                detail: "database is not reachable"

  /api/v1/analytics/users/daily/{day}:
    get:
      operationId: GetDailyUniqueUsers
      description: >
        Count of unique users who logged in on the given day (UTC).
        The day must not be in the future.
      parameters:
        - name: day
          in: path
          required: true
          description: >
            The UTC date to query, in YYYY-MM-DD format.
            Must not be a future date.
          schema:
            type: string
            format: date
            example: "2026-05-21"
      responses:
        "200":
          description: unique user count for the UTC day
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: integer
              example:
                data: 42
        "400":
          description: invalid date format or future date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_format:
                  summary: invalid date format
                  value:
                    type: "https://github.com/JoelLau/user-analytics-service/errors/invalid-param"
                    title: "Bad Request"
                    status: 400
                    detail: "invalid value for 'day': parsing time \"not-a-date\" as \"2006-01-02\": cannot parse \"not-a-date\" as \"2006\" (e.g. '2026-05-21')"
                future_date:
                  summary: future date
                  value:
                    type: "https://github.com/JoelLau/user-analytics-service/errors/invalid-param"
                    title: "Bad Request"
                    status: 400
                    detail: "day must not be in the future"

  /api/v1/analytics/users/monthly/{month}:
    get:
      operationId: GetMonthlyUniqueUsers
      description: >
        Count of unique users who logged in during the given month (UTC).
        The month must not be in the future.
      parameters:
        - name: month
          in: path
          required: true
          description: >
            The UTC month to query, in YYYY-MM format.
            Must not be a future month.
          schema:
            type: string
            example: "2026-05"
      responses:
        "200":
          description: unique user count for the UTC month
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: integer
              example:
                data: 317
        "400":
          description: invalid month format or future month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_format:
                  summary: invalid month format
                  value:
                    type: "https://github.com/JoelLau/user-analytics-service/errors/invalid-param"
                    title: "Bad Request"
                    status: 400
                    detail: "month must be in the format YYYY-MM (e.g. 2026-05)"
                future_month:
                  summary: future month
                  value:
                    type: "https://github.com/JoelLau/user-analytics-service/errors/invalid-param"
                    title: "Bad Request"
                    status: 400
                    detail: "month must not be in the future"

components:
  schemas:
    ErrorResponse: # loosely based on RFC9457
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem.
        status:
          type: integer
          description: The HTTP status code generated for this occurrence.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: A URI reference for this specific occurrence (e.g. trace ID).
